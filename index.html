            <div class="text-right">

            <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-100">
                <div class="text-xs text-gray-500 font-bold uppercase tracking-wider">전체 활성 공고</div>
                <div class="text-3xl font-bold mt-2 text-slate-800" x-text="jobs.length">0</div>

            <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-100">
                <div class="text-xs text-gray-500 font-bold uppercase tracking-wider">재택근무 가능 공고</div>
                <div class="text-3xl font-bold mt-2 text-indigo-600" x-text="remoteCount()">0</div>

            <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-100">
                <div class="text-xs text-gray-500 font-bold uppercase tracking-wider">신입 지원 가능</div>
                <div class="text-3xl font-bold mt-2 text-emerald-600" x-text="entryCount()">0</div>

            <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-100">

                <div class="text-3xl font-bold mt-2 text-amber-600">4 (멀티)</div>
            </div>
        </div>

        <!-- FILTER & SEARCH BAR -->
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 mb-8 flex flex-col gap-4">
            <div class="flex flex-col md:flex-row gap-4">
                <!-- Search -->
                <div class="flex-1">
                    <label class="block text-xs font-bold text-gray-500 mb-2">키워드 검색 (회사명, 공고명, 사용기술)</label>
                    <input type="text" x-model="searchQuery" placeholder="예: 시프트업, SAP, 결산, 주2회..."
                           class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-slate-800 text-sm">
                </div>
                <!-- Category Filter -->
                <div class="w-full md:w-48">
                    <label class="block text-xs font-bold text-gray-500 mb-2">직무 대분류 필터</label>
                    <select x-model="selectedCategory" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-slate-800 text-sm bg-white">
                        <option value="all">전체 직무</option>
                        <option value="회계">회계</option>
                        <option value="세무">세무</option>
                        <option value="재무/자금">재무/자금</option>
                        <option value="내부통제">내부통제</option>
                    </select>
                </div>
                <!-- Work Type Filter -->
                <div class="w-full md:w-48">
                    <label class="block text-xs font-bold text-gray-500 mb-2">근무형태 필터</label>
                    <select x-model="selectedWorkType" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-slate-800 text-sm bg-white">
                        <option value="all">전체 형태</option>
                        <option value="풀재택">풀재택</option>
                        <option value="하이브리드 (주2~3회 재택)">하이브리드</option>
                        <option value="전면출근">전면출근</option>
                    </select>
                </div>
            </div>

            <!-- Experience Range Slider -->
            <div class="border-t border-gray-100 pt-4">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold text-gray-500">최소 요구 연차 제한 (이하만 필터링)</span>
                    <span class="mono text-xs font-bold text-slate-700" x-text="maxExperienceFilter === '15' ? '연차 제한 무관' : maxExperienceFilter + '년 이하 요구'">전체</span>
                </div>
                <input type="range" min="0" max="15" x-model="maxExperienceFilter" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-slate-800">
            </div>
        </div>

        <!-- JOB LIST TABLE & CARDS (RESPONSIVE) -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">

            <div class="p-4 bg-slate-50 border-b border-gray-100 flex justify-between items-center">
                <h3 class="font-bold text-slate-800 text-sm">목록 결과 (<span x-text="filteredJobs().length">0</span>건 매칭)</h3>
                <div class="text-xs text-gray-400">데이터를 클릭하면 본문 세부 내용 요약이 열립니다.</div>
            </div>

            <!-- DESKTOP TABLE -->

                            <th class="px-6 py-4">공고 제목</th>
                            <th class="px-6 py-4">직무 대분류</th>
                            <th class="px-6 py-4">요구 경력</th>
                            <th class="px-6 py-4">근무 형태</th>
                            <th class="px-6 py-4">주요 ERP / 도구</th>
                            <th class="px-6 py-4">출처</th>
                            <th class="px-6 py-4">동작</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <template x-for="job in filteredJobs()" :key="job.id">
                            <tr class="hover:bg-slate-50 transition-colors">
                                <td class="px-6 py-4 font-bold text-slate-800" x-text="job.company_name">회사명</td>
                                <td class="px-6 py-4">
                                    <div class="font-medium text-blue-600 hover:underline cursor-pointer"
                                         x-text="job.title" @click="toggleDetails(job.id)">제목</div>
                                    <div class="text-xs text-gray-400 mt-1" x-text="job.location">근무지</div>
                                </td>
                                <td class="px-6 py-4">
                                    <span class="px-2 py-1 text-xs rounded font-bold"
                                          :class="{
                                              'bg-emerald-100 text-emerald-800': job.primary_category === '회계',
                                              'bg-amber-100 text-amber-800': job.primary_category === '세무',
                                              'bg-indigo-100 text-indigo-800': job.primary_category === '재무/자금',
                                              'bg-purple-100 text-purple-800': job.primary_category === '내부통제'
                                          }" x-text="job.primary_category">분류</span>
                                </td>
                                <td class="px-6 py-4 mono" x-text="getExperienceStr(job)">연차</td>
                                <td class="px-6 py-4 text-xs font-semibold" x-text="job.work_type">근무형태</td>
                                <td class="px-6 py-4">
                                    <span class="mono px-1.5 py-0.5 bg-gray-100 text-gray-700 text-xs rounded font-bold" x-text="job.tools_used">TOOLS</span>

                                <td class="px-6 py-4 uppercase text-xs font-bold text-gray-400" x-text="job.source">wanted</td>
                                <td class="px-6 py-4">

                            <div class="space-y-3">
                                <div>
                                    <div class="font-bold text-xs text-emerald-800 mb-1">📌 필수 요건</div>
                                    <ul class="list-disc pl-4 text-[11px] text-slate-600 space-y-0.5">
                                        <template x-for="req in parseJsonList(job.key_requirements)" :key="req">
                                            <li x-text="req"></li>
                                        </template>
                                    </ul>
                                </div>
                                <div>
                                    <div class="font-bold text-xs text-indigo-800 mb-1">🎁 우대 사항</div>
                                    <ul class="list-disc pl-4 text-[11px] text-slate-600 space-y-0.5">
                                        <template x-for="pref in parseJsonList(job.preferred_skills)" :key="pref">
                                            <li x-text="pref"></li>
                                        </template>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-between items-center mt-4 pt-4 border-t border-gray-100/50">
                            <button @click="toggleDetails(job.id)" class="text-xs text-slate-500 font-bold hover:underline" x-text="activeDetails.includes(job.id) ? '상세 접기' : '상세 열기'"></button>
                            <a :href="job.origin_url" target="_blank" class="text-xs bg-slate-800 text-white px-4 py-2 rounded hover:bg-slate-700 font-bold">지원 링크 이동</a>
                        </div>
                    </div>
                </template>
            </div>

            <!-- EMPTY STATE -->
            <div x-show="filteredJobs().length === 0" class="p-12 text-center" x-transition>
                <p class="text-gray-400 text-sm">해당 검색 필터 조건에 부합하는 활성 채용 공고가 존재하지 않습니다.</p>
                <button @click="resetFilters()" class="text-xs text-blue-600 font-bold hover:underline mt-2">필터 전체 초기화</button>
            </div>

        </div>

    </main>

게임스데일리 강인석 기자 kang12@tgdaily.co.kr]\n                                            \n\n\n2026-04-30\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n해긴 '라스트 헌터 K : 서울' 글로벌 론칭\n\n\n\n                                                해긴(대표 이영일)은 28일 '라스트 헌터 K : 서울'을 글로벌 13개국 구글 플레이와 애플 앱스토어를 통해 선보였다.이 작품은 제4차 세계대전과 핵전쟁 이후 황폐해진 근 미래의 서울을 배경으로 한 액션 게임이다. 적의 공격 패턴에 맞춰 대응하는 패링, 회피, 카운터 등 정교한 조작의 재미를 즐길 수 있다.이 회사는 한손검 대검 카타나 해머 활 등 5개의 무기 스타일을 제공한다. 몬스터와의 일대일 대결이나 협동 모드를 비롯해 얼굴과 체형이나 문신까지 조정하는 커스터마이징 시스템 등이 지원된다.[더게임스데일리 이주환 기자 ejohn@tgdaily.co.kr]\n                                            \n\n\n2026-04-28\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n해긴, 모처럼 시장서 존재감 드러냈다\n\n\n\n                                                '라스트 헌터 K : 서울'그간 다소 잠잠해 온 해긴이 올 들어 모처럼 시장서 존재감을 드러내 보이고 있다.15일 관련업계에 따르면 최근 해긴(대표 이영일)은 신작 출시 행보에 속도를 내고 있다. 지난달 26일 '2026 프로야구 GO'를 론칭한 이후 불과 10여일 만에 '라스트 헌터 K : 서울' 의 사전예약에 돌입한 것이다.이 회사는 앞서 지난 2년간 한 해에 한 작품만을 선보여 왔다. 더욱이 이렇게 선보인 작품 역시 시장에서 큰 성과를 나타내지 못했다. 하지만 올 들어선 상반기가 끝나기 전에 벌써 2개작을 선보였다. 그 것도 흥행 기대감을 안겨주면서 바람을 일으키고 있는 것이다.'2026 프로야구 GO'는 KBO 라이선스를 활용한 캐주얼 스포츠 게임이다. 자동 육성 시스템을 도입해 성장의 재미에만 몰입할 수 있게 했다.  이 회사의 이같은 선택이 주효했는지, 론칭 이후 애플 앱스토어 인기 1위, 구글 플레이 3위 등의 성적을 기록하고 있다.회사측에선 대규모 업데이트를 진행하는 등 콘텐츠를 강화할 태세다. 최근 프로야구 개막으로 야구게임 전반에 걸쳐 유저들의 관심이 높아지고 있는 가운데, 이 작품이 두드러지게 활약하고 있다.'라스트 헌터 K'는 이 회사가 처음 시도하는 액션 게임이다. 아직 정확한 출시일이나 작품 정보에 대해서는 공개되지 않았지만, 화려한 액션과 그래픽, 커스터 마이징 요소 등이 유저들의 큰 관심을 사고 있다. 한동안 모바일 액션 게임 출시가 예고되지 않은 만큼, 이 작품이 틈새 시장에서 자리를 잡고 바람을 일으킬 수 있을지 귀추가 주목된다.이에 대해 업계의 한 관계자는 \" 유니콘 기업 반열에 올랐던 해긴이 한동안 잠잠한 모습을 보여왔다\"며 \"올해 해긴에서 발표하는 작품들이 시장에서 어느만큼 선전하며 자리를 잡을 수 있을 것인가에 대한 관심이 의외로 뜨거운 편\"이라고 말했다.[더게임스데일리 강인석 기자 kang12@tgdaily.co.kr]\n                                            \n\n\n2026-04-15\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n본 채용정보는 게임잡의 동의없이 무단전재, 재배포, 재가공할 수 없으며, 구직활동 이외의 용도로 사용될 수 없습니다.\n\n\n\n\n불법/허위/과장/오류 신고 \n\n\n\n\n\n\n\n                본 정보는 \n㈜해긴\n에서 제공한 자료로 게임잡의 동의없이 무단전재 또는 재배포, 재가공할 수 없으며, 게재된 채용기업과 채용담당자의 정보는 구직활동 이외의 용도로 사용될 수 없습니다.\n                         // 3. 근무형태 필터
                        const matchWork = this.selectedWorkType === 'all' || job.work_type === this.selectedWorkType;

                        // 4. 요구 연차 필터 (예: 슬라이더 3년 이하인 공고만 필터할 때, min_experience가 3 이하인지 비교)
                        let matchExp = true;
                        if (this.maxExperienceFilter !== '15') {
                            const maxLimit = parseInt(this.maxExperienceFilter);
                            matchExp = job.min_experience <= maxLimit;
                        }

                        return matchQuery && matchCat && matchWork && matchExp;
                    });
                },

                toggleDetails(id) {
                    if (this.activeDetails.includes(id)) {
                        this.activeDetails = this.activeDetails.filter(d => d !== id);
                    } else {
                        this.activeDetails.push(id);
                    }
                },

                getExperienceStr(job) {
                    if (job.min_experience === 0 && (!job.max_experience || job.max_experience <= 1)) {
                        return "신입 지원가능";
                    }
                    const min = job.min_experience || 0;
                    const max = job.max_experience ? `~${job.max_experience}년` : "년 이상";
                    return `경력 ${min}${max}`;
                },

                parseJsonList(jsonStr) {
                    try {
                        return JSON.parse(jsonStr);
                    } catch(e) {
                        return [jsonStr];
                    }
                },

                remoteCount() {
                    return this.jobs.filter(j => j.work_type !== '전면출근').length;
                },

                entryCount() {
                    return this.jobs.filter(j => j.min_experience === 0).length;
                },

                resetFilters() {
                    this.searchQuery = '';
                    this.selectedCategory = 'all';
                    this.selectedWorkType = 'all';
                    this.maxExperienceFilter = '15';
                }
            }
        }
    </script>
</body>
</html>
