name: Game Finance Job Daily Scraper

on:
  schedule:
    # 매일 한국 시간 오전 8시 자동 구동 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch: # 수동 가동 지원

permissions:
  contents: write # 갱신된 DB 및 index.html 커밋 권한 보장

# 같은 브랜치에서 두 실행이 겹치지 않게 직렬화한다. 겹치면 ① 같은 기준 DB에서 각자
# 수집해 나중 실행의 결과가 바이너리 충돌로 버려지고 ② 텔레그램이 두 통 갈 수 있다
# (2026-07-22 코덱스 교차검토 지적). 진행 중인 실행을 죽이면 그날 수집이 통째로
# 날아가므로 cancel-in-progress는 false — 뒤 실행이 기다린다.
concurrency:
  group: daily-scraper-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  run-daily-scraping:
    runs-on: ubuntu-latest
    outputs:
      retry_needed: ${{ steps.detect-failed.outputs.retry_needed }}
    steps:
    - name: Checkout private repository code
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 캐시 키에 '실제 설치된' playwright 버전을 사용한다. requirements.txt 해시 키는
    # '>=' 지정 탓에 playwright가 버전업돼도 키가 안 바뀌어, 구버전 브라우저 캐시를
    # 신버전이 못 쓰는 불일치가 생겼다(2026-07-02 run48 원티드 3회 전멸의 원인).
    - name: Get installed Playwright version
      id: playwright-version
      # playwright 최상위 모듈에는 __version__이 없다(실측: AttributeError).
      # 그런데 echo는 성공해서 스텝이 초록불로 끝나고 캐시 키만 'Linux-playwright-'로
      # 비어버린다 — 버전이 올라도 키가 안 바뀌는, 바로 이 스텝이 막으려던 상태
      # (2026-07-02 run48 원티드 3회 전멸의 원인)로 조용히 되돌아가 있었다.
      # 배포 메타데이터에서 읽고, 빈 값이면 스텝을 실패시켜 무음을 막는다.
      run: |
        VER=$(python -c 'from importlib.metadata import version; print(version("playwright"))')
        if [ -z "$VER" ]; then
          echo "playwright 버전 확인 실패 — 캐시 키가 무력화되므로 중단한다" >&2
          exit 1
        fi
        echo "version=$VER" >> "$GITHUB_OUTPUT"

    - name: Cache Playwright Chromium
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

    # 캐시 적중 여부와 무관하게 항상 실행 — 브라우저가 이미 있으면 다운로드를 건너뛰는
    # 멱등 명령이라 추가 비용이 없고, 캐시가 어긋나 있어도 스스로 복구한다.
    - name: Install Playwright Chromium
      run: python -m playwright install chromium

    # 회귀 게이트 — 사이트 개편 등으로 파서/필터가 깨진 채 수집·커밋되는 것을 차단.
    # test_wanted_debug는 라이브 네트워크 의존이라 제외한다.
    - name: Run unit tests (regression gate)
      env:
        PYTHONPATH: .
      run: |
        pip install pytest
        python -m pytest tests/ --ignore=tests/test_wanted_debug.py -q

    - name: Run E2E Scraping & Hybrid Classification Pipeline (1st attempt)
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        PYTHONPATH: .
        # 실패 소스가 있으면 알림을 보류한다 — 재시도 잡이 최종 결과 1통만 발송
        SUPPRESS_ALERT_ON_SOURCE_FAILURE: '1'
      run: |
        # 가동 환경변수 동적 삽입 (러너는 UTC이므로 한국 시간 기준으로 날짜 고정)
        export RUN_DATE_STR=$(TZ='Asia/Seoul' date +'%Y-%m-%d')

        # 수동(workflow_dispatch) 가동 시에는 강제 실행(--force) 하도록 하여 테스트 완수 지원
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          python src/main.py --mode all --force
        else
          python src/main.py --mode all
        fi

    # 실패 소스 감지 → 새 러너(새 IP)에서 2차 시도를 예약한다.
    # 잡코리아류 차단은 러너 IP 단위(connect timeout)라 같은 러너 안에서는 복구 불가.
    - name: Detect failed sources
      id: detect-failed
      run: |
        if [ -s data/last_failed_sources.txt ]; then
          echo "retry_needed=true" >> "$GITHUB_OUTPUT"
          echo "1차 시도 실패 소스: $(tr '\n' ' ' < data/last_failed_sources.txt)"
        else
          echo "retry_needed=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Automatically commit and push database & index.html updates
      run: |
        # Git 사용자 설정 및 추적 (안전한 Commit-Protocol 트레일러 주입)
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        # 파일이 실제로 존재할 때만 안전하게 add 처리
        [ -f data/scrap_master.db ] && git add data/scrap_master.db || echo "No DB file found"
        [ -f index.html ] && git add index.html || echo "No index.html file found"
        [ -f PRD/PROGRESS.md ] && git add PRD/PROGRESS.md || echo "No PROGRESS file found"

        # 변경 사항이 있을 경우에만 커밋 자동 배포 진행 (에러 방지)
        if ! git diff --cached --quiet; then
          git commit -m "$(cat <<'EOF'
        chore(data): auto-update scraped job postings database & html report

        Co-Authored-By: Claude Opus 4.8 (1M context) <noreply@anthropic.com>
        EOF
          )"
          # 푸시 거절 대비 — 실행 도중(수집에 10분 가까이 걸린다) 누군가 같은 브랜치에
          # 푸시하면 'fetch first'로 거절된다(2026-07-22 실측: 문서 커밋 한 번에 잡 전체 실패).
          # 원격을 받아 rebase 후 한 번 더 시도한다. 그래도 실패하면(같은 파일 충돌)
          # 조용히 넘기지 않고 잡을 실패시켜 크래시 알림이 울리게 둔다.
          git push origin HEAD:${{ github.ref_name }} || {
            echo "[WARN] 푸시 거절 — 원격이 앞서 있음. rebase 후 재시도"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          }
        else
          echo "No database or index.html updates found today."
        fi

    # 파이프라인 자체가 죽으면(테스트 게이트 실패·크래시) 텔레그램이 아예 침묵하므로,
    # 잡 실패 시 최소한의 경보를 직접 쏜다 — 무음 실패 방지의 마지막 안전망.
    - name: Notify pipeline crash via Telegram
      if: failure()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # 시크릿 값에 줄바꿈·따옴표가 섞여 있으면 URL이 깨져 curl이 exit 3으로 죽는다.
        # (2026-07-22 실측: 이 안전망이 정작 필요한 순간에 URL malformed로 실패했다.
        #  src/reporter/telegram_sender.py도 같은 이유로 strip을 하고 있었는데
        #  여기만 원본을 그대로 URL에 끼워 넣고 있었다.)
        TOKEN=$(printf '%s' "${TELEGRAM_BOT_TOKEN}" | tr -d "\r\n\"'")
        CHAT=$(printf '%s' "${TELEGRAM_CHAT_ID}" | tr -d "\r\n\"'")
        # --fail-with-body가 없으면 curl은 HTTP 400/401/429/500도 '성공'으로 끝낸다.
        # 토큰 오류·봇 추방·API 장애로 알림이 안 갔는데 스텝은 초록불인 무음이 된다(코덱스 지적).
        curl -sS --fail-with-body --max-time 20 -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
          --data-urlencode chat_id="${CHAT}" \
          --data-urlencode text="🚨 수집 파이프라인 1차 실행이 도중에 실패했습니다. 로그 확인: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" > /dev/null

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 2차 시도 — 1차에서 소스 실패가 있으면 '새 러너(새 IP)'로 전체 파이프라인 재실행.
  # 수집이 목적인 시스템이므로 실패를 보고로 끝내지 않고 복구를 먼저 시도한다.
  # 파이프라인은 멱등(upsert + 델타 분석)이라 같은 날 재실행이 안전하다.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  retry-on-fresh-runner:
    needs: run-daily-scraping
    # always()가 필요하다. 1차 잡이 실패로 끝나면 기본 규칙상 이 잡이 건너뛰어지는데,
    # 1차는 '실패 소스가 있으니 최종 브리핑은 2차가 보낸다'며 발송을 보류한 상태다.
    # 즉 2차가 안 돌면 브리핑이 통째로 사라진다 — 정확히 이 시스템이 막으려는 무음 실패다
    # (2026-07-22 실측: 푸시 거절로 1차가 죽자 2차 skipped → 그날 브리핑 실종).
    # retry_needed는 detect-failed 스텝이 설정하므로, 그 앞에서 죽으면(테스트 게이트 실패 등)
    # 값이 비어 이 조건이 false가 되고 재시도도 하지 않는다 — 코드가 깨진 날의 올바른 동작.
    # !cancelled()가 없으면 사람이 1차 잡을 취소해도 2차가 살아나 계속 돈다(코덱스 지적).
    if: always() && !cancelled() && needs.run-daily-scraping.outputs.retry_needed == 'true'
    runs-on: ubuntu-latest
    steps:
    # 기본값(github.sha)은 1차 잡이 방금 push한 데이터 커밋을 못 보므로 브랜치 최신 tip을 명시
    - name: Checkout latest branch tip
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        ref: ${{ github.ref_name }}

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Get installed Playwright version
      id: playwright-version
      # playwright 최상위 모듈에는 __version__이 없다(실측: AttributeError).
      # 그런데 echo는 성공해서 스텝이 초록불로 끝나고 캐시 키만 'Linux-playwright-'로
      # 비어버린다 — 버전이 올라도 키가 안 바뀌는, 바로 이 스텝이 막으려던 상태
      # (2026-07-02 run48 원티드 3회 전멸의 원인)로 조용히 되돌아가 있었다.
      # 배포 메타데이터에서 읽고, 빈 값이면 스텝을 실패시켜 무음을 막는다.
      run: |
        VER=$(python -c 'from importlib.metadata import version; print(version("playwright"))')
        if [ -z "$VER" ]; then
          echo "playwright 버전 확인 실패 — 캐시 키가 무력화되므로 중단한다" >&2
          exit 1
        fi
        echo "version=$VER" >> "$GITHUB_OUTPUT"

    - name: Cache Playwright Chromium
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

    - name: Install Playwright Chromium
      run: python -m playwright install chromium

    # 회귀 게이트를 여기서도 돌린다. '1차에서 같은 코드로 통과했다'는 전제는 깨질 수 있다 —
    # 이 잡은 브랜치 최신 tip을 체크아웃하므로, 1차 실행 도중 누가 푸시했거나 1차 push가
    # 거절돼 새 커밋 위로 rebase되면 여기서 도는 코드는 검증된 적 없는 코드다(코덱스 지적).
    - name: Run unit tests (regression gate)
      env:
        PYTHONPATH: .
      run: python -m pytest tests/ --ignore=tests/test_wanted_debug.py -q

    - name: Run E2E Pipeline (retry — always send final alert)
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        PYTHONPATH: .
      run: |
        export RUN_DATE_STR=$(TZ='Asia/Seoul' date +'%Y-%m-%d')
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          python src/main.py --mode all --force
        else
          python src/main.py --mode all
        fi

    - name: Automatically commit and push database & index.html updates
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        [ -f data/scrap_master.db ] && git add data/scrap_master.db || echo "No DB file found"
        [ -f index.html ] && git add index.html || echo "No index.html file found"
        [ -f PRD/PROGRESS.md ] && git add PRD/PROGRESS.md || echo "No PROGRESS file found"

        if ! git diff --cached --quiet; then
          git commit -m "$(cat <<'EOF'
        chore(data): auto-update scraped job postings database & html report (retry run)

        Co-Authored-By: Claude Opus 4.8 (1M context) <noreply@anthropic.com>
        EOF
          )"
          # 1차 잡과 같은 이유로 거절 대비 rebase 재시도 (실행 중 동시 푸시)
          git push origin HEAD:${{ github.ref_name }} || {
            echo "[WARN] 푸시 거절 — 원격이 앞서 있음. rebase 후 재시도"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          }
        else
          echo "No database or index.html updates found on retry."
        fi

    - name: Notify pipeline crash via Telegram
      if: failure()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # 시크릿의 줄바꿈·따옴표를 제거하지 않으면 URL이 깨져 curl이 exit 3으로 죽는다
        # (2026-07-22 실측 — 1차 잡의 같은 스텝 주석 참조)
        TOKEN=$(printf '%s' "${TELEGRAM_BOT_TOKEN}" | tr -d "\r\n\"'")
        CHAT=$(printf '%s' "${TELEGRAM_CHAT_ID}" | tr -d "\r\n\"'")
        # --fail-with-body가 없으면 curl은 HTTP 400/401/429/500도 '성공'으로 끝낸다.
        # 토큰 오류·봇 추방·API 장애로 알림이 안 갔는데 스텝은 초록불인 무음이 된다(코덱스 지적).
        curl -sS --fail-with-body --max-time 20 -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
          --data-urlencode chat_id="${CHAT}" \
          --data-urlencode text="🚨 수집 파이프라인 재시도 실행마저 도중에 실패했습니다. 로그 확인: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" > /dev/null
