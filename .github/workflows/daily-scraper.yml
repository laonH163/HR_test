name: Game Finance Job Daily Scraper

on:
  schedule:
    # 매일 한국 시간 오전 8시 자동 구동 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch: # 수동 가동 지원

permissions:
  contents: write # 갱신된 DB 및 index.html 커밋 권한 보장

jobs:
  run-daily-scraping:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout private repository code
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Cache Playwright Chromium
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Chromium
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: python -m playwright install chromium

    # 회귀 게이트 — 사이트 개편 등으로 파서/필터가 깨진 채 수집·커밋되는 것을 차단.
    # test_wanted_debug는 라이브 네트워크 의존이라 제외한다.
    - name: Run unit tests (regression gate)
      env:
        PYTHONPATH: .
      run: |
        pip install pytest
        python -m pytest tests/ --ignore=tests/test_wanted_debug.py -q

    - name: Run E2E Scraping & Hybrid Classification Pipeline
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        PYTHONPATH: .
      run: |
        # 가동 환경변수 동적 삽입 (러너는 UTC이므로 한국 시간 기준으로 날짜 고정)
        export RUN_DATE_STR=$(TZ='Asia/Seoul' date +'%Y-%m-%d')

        # 수동(workflow_dispatch) 가동 시에는 강제 실행(--force) 하도록 하여 테스트 완수 지원
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          python src/main.py --mode all --force
        else
          python src/main.py --mode all
        fi

    - name: Automatically commit and push database & index.html updates
      run: |
        # Git 사용자 설정 및 추적 (안전한 Commit-Protocol 트레일러 주입)
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        # 파일이 실제로 존재할 때만 안전하게 add 처리
        [ -f data/scrap_master.db ] && git add data/scrap_master.db || echo "No DB file found"
        [ -f index.html ] && git add index.html || echo "No index.html file found"
        [ -f PRD/PROGRESS.md ] && git add PRD/PROGRESS.md || echo "No PROGRESS file found"

        # 변경 사항이 있을 경우에만 커밋 자동 배포 진행 (에러 방지)
        if ! git diff --cached --quiet; then
          git commit -m "$(cat <<'EOF'
        chore(data): auto-update scraped job postings database & html report

        Co-Authored-By: Claude Opus 4.8 (1M context) <noreply@anthropic.com>
        EOF
          )"
          git push origin HEAD:${{ github.ref_name }}
        else
          echo "No database or index.html updates found today."
        fi
